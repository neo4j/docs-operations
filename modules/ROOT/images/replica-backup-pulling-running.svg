<svg width="780" height="260" viewBox="0 0 780 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Replica running state with differential backups</title>
  <desc id="desc">After initialization, a user backup process keeps uploading differential backups to the pullURI location. The replica consumes only the unbroken chain of differential backups.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1A1B1D"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="778" height="258" rx="12" fill="#FFFFFF" stroke="#1A1B1D" stroke-width="2"/>
  <text x="32" y="38" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Running</text>
  <text x="32" y="64" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="14">After initialization, the replica consumes only differential backups from pullURI.</text>

  <rect x="40" y="102" width="150" height="74" rx="8" fill="#F5F6F6" stroke="#1A1B1D" stroke-width="1.5"/>
  <text x="115" y="134" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Upstream</text>
  <text x="115" y="154" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="13">database</text>

  <rect x="242" y="92" width="158" height="94" rx="8" fill="#EAF5F1" stroke="#1A1B1D" stroke-width="1.5"/>
  <text x="321" y="123" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">User backup</text>
  <text x="321" y="143" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">process</text>
  <text x="321" y="164" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="13">keeps uploading diffs</text>

  <rect x="454" y="78" width="186" height="122" rx="8" fill="#F5F6F6" stroke="#1A1B1D" stroke-width="1.5"/>
  <text x="547" y="107" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">pullURI location</text>
  <rect x="475" y="126" width="48" height="34" rx="4" fill="#6EAFA1"/>
  <text x="499" y="148" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Diff</text>
  <rect x="535" y="126" width="48" height="34" rx="4" fill="#6EAFA1"/>
  <text x="559" y="148" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Diff</text>
  <rect x="595" y="126" width="24" height="34" rx="4" fill="#6EAFA1"/>
  <text x="607" y="148" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">...</text>
  <text x="547" y="181" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="12">unbroken diff chain</text>

  <rect x="684" y="102" width="56" height="74" rx="8" fill="#F5F6F6" stroke="#1A1B1D" stroke-width="1.5"/>
  <text x="712" y="134" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Replica</text>
  <text x="712" y="154" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="12">applies</text>

  <line x1="190" y1="139" x2="235" y2="139" stroke="#1A1B1D" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="139" x2="447" y2="139" stroke="#1A1B1D" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="139" x2="677" y2="139" stroke="#1A1B1D" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
