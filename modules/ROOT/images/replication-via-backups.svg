<svg width="562" height="722" viewBox="0 0 562 722" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Schema of replicating a database across clusters via backups</title>
  <desc id="desc">Cluster A writes backups to object storage. Cluster B pulls those backups from object storage to maintain a replica database. There is no direct network connection between the clusters.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1A1B1D"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="560" height="720" rx="19" fill="#FFFFFF" stroke="#1A1B1D" stroke-width="2"/>

  <text x="281" y="48" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Replication via backups</text>
  <text x="281" y="73" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="14">No direct network connection is needed between clusters</text>

  <rect x="25" y="108" width="210" height="584" rx="20" fill="#F5F6F6"/>
  <rect x="327" y="108" width="210" height="584" rx="20" fill="#F5F6F6"/>

  <text x="130" y="143" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Cluster A</text>
  <text x="130" y="165" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="13">upstream database</text>
  <text x="432" y="143" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Cluster B</text>
  <text x="432" y="165" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="13">replica database</text>

  <circle cx="130" cy="252" r="58" fill="#014063"/>
  <path d="M130 219C112 219 96 224 96 233V273C96 282 112 287 130 287C148 287 164 282 164 273V233C164 224 148 219 130 219Z" fill="#FFFFFF"/>
  <ellipse cx="130" cy="233" rx="34" ry="13" fill="#DDE9EF"/>
  <path d="M96 246C96 255 112 260 130 260C148 260 164 255 164 246" stroke="#014063" stroke-width="3"/>
  <path d="M96 260C96 269 112 274 130 274C148 274 164 269 164 260" stroke="#014063" stroke-width="3"/>
  <text x="130" y="333" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">foo</text>
  <text x="130" y="352" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="13">read-write</text>

  <circle cx="432" cy="252" r="58" fill="#1A1B1D"/>
  <path d="M432 219C414 219 398 224 398 233V273C398 282 414 287 432 287C450 287 466 282 466 273V233C466 224 450 219 432 219Z" fill="#FFFFFF"/>
  <ellipse cx="432" cy="233" rx="34" ry="13" fill="#DDE9EF"/>
  <path d="M398 246C398 255 414 260 432 260C450 260 466 255 466 246" stroke="#1A1B1D" stroke-width="3"/>
  <path d="M398 260C398 269 414 274 432 274C450 274 466 269 466 260" stroke="#1A1B1D" stroke-width="3"/>
  <text x="432" y="333" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">foo-replica</text>
  <text x="432" y="352" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="13">read-only</text>

  <rect x="194" y="423" width="174" height="132" rx="16" fill="#FFFFFF" stroke="#1A1B1D" stroke-width="2"/>
  <path d="M235 467C235 453 247 442 281 442C315 442 327 453 327 467V508C327 522 315 533 281 533C247 533 235 522 235 508V467Z" fill="#EAF5F1" stroke="#1A1B1D" stroke-width="2"/>
  <ellipse cx="281" cy="467" rx="46" ry="17" fill="#6EAFA1" stroke="#1A1B1D" stroke-width="2"/>
  <path d="M235 489C235 503 247 514 281 514C315 514 327 503 327 489" stroke="#1A1B1D" stroke-width="2"/>
  <text x="281" y="582" text-anchor="middle" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Object storage</text>
  <text x="281" y="603" text-anchor="middle" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="13">full backup + differential backups</text>

  <path d="M174 330C211 365 239 390 262 422" stroke="#1A1B1D" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="183" y="390" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">backup process</text>
  <text x="183" y="408" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="12">pushes backups</text>

  <path d="M368 471C420 452 454 414 448 332" stroke="#1A1B1D" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="390" y="431" fill="#1A1B1D" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">replica</text>
  <text x="390" y="449" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="12">pulls backups</text>

  <line x1="235" y1="252" x2="327" y2="252" stroke="#B7BDC5" stroke-width="2" stroke-dasharray="7 7"/>
  <text x="281" y="238" text-anchor="middle" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="12">no direct cluster link</text>
</svg>
